<nav class="tab-nav">
  @for (group of groups; track group.labelKey) {
    <section class="tab-nav__group">
      <span class="tab-nav__group-label">{{ group.labelKey | translate }}</span>
      <div class="tab-nav__group-tabs">
        @for (tab of group.tabs; track tab.id) {
          <button class="tab-btn" [class.active]="activeTab() === tab.id" (click)="switchTab(tab.id)">
            {{ tab.labelKey | translate }}
          </button>
        }
      </div>
    </section>
  }
</nav>
