<div class="fancy-date-input" (click)="stopPropagation($event)">
  <button type="button" class="fancy-date-trigger" [disabled]="disabled()" (click)="toggleOpen($event)">
    <span [class.is-placeholder]="!displayValue()">{{ displayValue() || placeholder() }}</span>
    <span class="fancy-date-trigger__icon" aria-hidden="true">▾</span>
  </button>

  @if (isOpen()) {
    <div class="fancy-date-popover">
      <div class="fancy-date-popover__topbar">
        <span class="fancy-date-popover__title">{{ ts.t('picker.selectDate') }}</span>
        <div class="fancy-date-popover__actions">
          <button type="button" class="soft" (click)="useToday()">{{ ts.t('picker.today') }}</button>
          <button type="button" class="close" (click)="close()">×</button>
        </div>
      </div>

      <div class="fancy-date-popover__header">
        <select class="fancy-date-year" [value]="viewDate().getFullYear()" (change)="setYear(($any($event.target).value))">
          @for (year of yearOptions(); track year) {
            <option [value]="year">{{ year }}</option>
          }
        </select>
        <div class="fancy-date-month-nav">
          <button type="button" (click)="prevMonth()">‹</button>
          <span>{{ monthLabel() }}</span>
          <button type="button" (click)="nextMonth()">›</button>
        </div>
      </div>

      <div class="fancy-date-weekdays">
        @for (day of weekdayLabels(); track day) {
          <span>{{ day }}</span>
        }
      </div>

      <div class="fancy-date-grid">
        @for (day of calendarDays(); track day.iso) {
          <button
            type="button"
            class="fancy-date-day"
            [class.is-outside]="!day.inMonth"
            [class.is-today]="day.isToday"
            [class.is-selected]="day.isSelected"
            (click)="pickDate(day.iso)">
            {{ day.dayNumber }}
          </button>
        }
      </div>

      <div class="fancy-date-popover__footer">
        <button type="button" class="ghost" (click)="clear()">{{ ts.t('picker.clear') }}</button>
        <button type="button" class="primary" (click)="apply()">{{ ts.t('picker.done') }}</button>
      </div>
    </div>
  }
</div>
