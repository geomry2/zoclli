<div class="modal-backdrop" (click)="close()"></div>

<div class="modal">
  <div class="modal-header">
    <div class="modal-header-info">
      <h2 class="modal-title">Add Unit</h2>
      <span class="modal-building">{{ buildingName() }}</span>
    </div>
    <button class="close-btn" (click)="close()">✕</button>
  </div>

  <div class="modal-body">
    @if (saveError()) {
      <div class="error-banner">{{ saveError() }}</div>
    }

    <datalist id="unit-apt-list">
      @for (n of usedApartmentNumbers; track n) {
        <option [value]="n"></option>
      }
    </datalist>

    <div class="form-grid">

      <!-- Unit details -->
      <div class="field-group section-divider full"><span>Unit Details</span></div>

      <div class="field-group">
        <label>Unit / Apartment No.</label>
        <input [(ngModel)]="unit.apartmentNumber" list="unit-apt-list" placeholder="e.g. 204" />
      </div>
      <div class="field-group">
        <label>Property Type</label>
        <select [(ngModel)]="unit.propertyType">
          @for (t of propertyTypes; track t) {
            <option [value]="t">{{ t }}</option>
          }
        </select>
      </div>
      <div class="field-group">
        <label>Status</label>
        <select [(ngModel)]="unit.status">
          @for (s of clientStatuses; track s) {
            <option [value]="s">{{ s }}</option>
          }
        </select>
      </div>
      <div class="field-group">
        <label>Purchase Date</label>
        <input [(ngModel)]="unit.purchaseDate" type="date" />
      </div>
      <div class="field-group full">
        <label>Deal Value (€)</label>
        <input [(ngModel)]="unit.dealValue" type="number" placeholder="0" />
      </div>

      <!-- Client details -->
      <div class="field-group section-divider full"><span>Client</span></div>

      <div class="field-group full">
        <label>Full Name *</label>
        <input [(ngModel)]="unit.name" placeholder="e.g. Jane Smith" />
      </div>
      <div class="field-group">
        <label>Phone</label>
        <input [(ngModel)]="unit.phone" placeholder="+1-555-0100" />
      </div>
      <div class="field-group">
        <label>Email</label>
        <input [(ngModel)]="unit.email" type="email" placeholder="jane@email.com" />
      </div>

      <!-- Realtor -->
      <div class="field-group section-divider full"><span>Realtor</span></div>

      <div class="field-group">
        <label>Realtor Name</label>
        <input [(ngModel)]="unit.realtorName" placeholder="e.g. Sandra Liu" />
      </div>
      <div class="field-group">
        <label>Agency</label>
        @if (agencyMode() === 'select') {
          <select [(ngModel)]="selectedAgency">
            <option value="">— Select agency —</option>
            @for (a of allAgencies; track a) {
              <option [value]="a">{{ a }}</option>
            }
            <option value="__new__">＋ Add new agency</option>
          </select>
        } @else {
          <div class="inline-new">
            <input [(ngModel)]="unit.realtorAgency" placeholder="New agency name" autofocus />
            <button class="btn-back" type="button" (click)="agencyMode.set('select')">↩</button>
          </div>
        }
      </div>

      <div class="field-group full">
        <label>Notes</label>
        <textarea [(ngModel)]="unit.notes" rows="3" placeholder="Any additional notes..."></textarea>
      </div>

    </div>
  </div>

  <div class="modal-footer">
    <button class="btn-cancel" (click)="close()">Cancel</button>
    <button class="btn-save" (click)="save()" [disabled]="saving()">
      {{ saving() ? 'Saving…' : 'Add Unit' }}
    </button>
  </div>
</div>
