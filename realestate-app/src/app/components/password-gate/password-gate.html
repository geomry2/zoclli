@if (authenticated()) {
  <ng-content />
} @else {
  <div class="gate-backdrop">
    <div class="gate-card">
      <div class="gate-logo">🏠</div>
      <h1 class="gate-title">Real Estate</h1>
      <p class="gate-subtitle">Enter password to continue</p>
      <input
        class="gate-input"
        type="password"
        placeholder="Password"
        [value]="input()"
        (input)="input.set($any($event.target).value)"
        (keydown)="onKey($event)"
        [class.error]="error()"
        autofocus
      />
      @if (error()) {
        <p class="gate-error">Incorrect password</p>
      }
      <button class="gate-btn" (click)="submit()">Enter</button>
    </div>
  </div>
}
