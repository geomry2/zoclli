@if (auth.loading()) {
  <div class="gate-backdrop">
    <div class="gate-card">
      <div class="gate-logo">Z</div>
      <h1 class="gate-title">{{ 'auth.title' | translate }}</h1>
      <p class="gate-subtitle">{{ 'auth.loading' | translate }}</p>
    </div>
  </div>
} @else if (auth.authenticated()) {
  <ng-content />
} @else {
  <div class="gate-backdrop">
    <div class="gate-card">
      <div class="gate-logo">Z</div>
      <h1 class="gate-title">{{ 'auth.title' | translate }}</h1>
      <p class="gate-subtitle">{{ 'auth.subtitle' | translate }}</p>

      <label class="gate-field">
        <span>{{ 'auth.login' | translate }}</span>
        <select
          class="gate-input gate-select"
          [ngModel]="login()"
          (ngModelChange)="login.set($event)"
          (keydown)="onKey($event)">
          @for (user of auth.users; track user.login) {
            <option [value]="user.login">{{ user.login }}</option>
          }
        </select>
      </label>

      <label class="gate-field">
        <span>{{ 'auth.password' | translate }}</span>
        <input
          class="gate-input"
          type="password"
          [attr.placeholder]="'auth.password' | translate"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          (keydown)="onKey($event)"
          [class.error]="error()"
          autofocus
        />
      </label>

      @if (error()) {
        <p class="gate-error">{{ 'auth.error' | translate }}</p>
      }
      <button class="gate-btn" (click)="submit()" [disabled]="auth.loading()">
        {{ auth.loading() ? ('auth.signingIn' | translate) : ('auth.enter' | translate) }}
      </button>
    </div>
  </div>
}
